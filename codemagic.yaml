workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      groups:
        - ios-credentials
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          CERTIFICATE_PATH=$CM_BUILD_DIR/distribution.p12
          echo "$CERTIFICATE_P12" | base64 --decode > $CERTIFICATE_PATH
          keychain add-certificates --certificate $CERTIFICATE_PATH --certificate-password "1234"
          app-store-connect fetch-signing-files com.dispatchup.driver \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --create
          xcode-project use-profiles
      - name: Install provisioning profile manually
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/919ea03f-6af7-41b2-87cf-b36e36867bb0.mobileprovision
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=AY3TN9N54Z \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="919ea03f-6af7-41b2-87cf-b36e36867bb0"
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>AY3TN9N54Z</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.dispatchup.driver</key>
              <string>919ea03f-6af7-41b2-87cf-b36e36867bb0</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/App/output
    artifacts:
      - ios/App/output/**/*.ipa
      - ios/App/App.xcarchive/**
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        cancel_previous_submissions: true