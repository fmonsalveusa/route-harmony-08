workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dispatchup.driver
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
            -authenticationKeyPath <(echo "$APP_STORE_CONNECT_PRIVATE_KEY") \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=AY3TN9N54Z
    artifacts:
      - ios/App/App.xcarchive