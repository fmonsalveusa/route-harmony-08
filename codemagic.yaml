workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 120
    environment:
      java: 17
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Fix gradlew permissions
        script: chmod +x android/gradlew
      - name: Build Android
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive
    artifacts:
      - ios/App/App.xcarchive