workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dispatchup.driver
        certificate: Dispatch Up Driver Distribution
        provisioning_profile: Dispatch Up Driver AppStore Profile
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=AY3TN9N54Z \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Dispatch Up Driver AppStore"
    artifacts:
      - ios/App/App.xcarchive  - ios/App/App.xcarchive